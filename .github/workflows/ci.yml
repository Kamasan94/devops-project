name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t  "${{ secrets.DOCKER_USERNAME }}"/devops-backend ./backend

      - name: Push backend
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/devops-backend

      - name: Build frontend
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/devops-frontend ./frontend

      - name: Push frontend
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/devops-frontend